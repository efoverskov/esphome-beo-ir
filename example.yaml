# Example ESPHome config for esphome-beo-ir on Raspberry Pi Pico W
#
# This example shows:
# - B&O IR decoder via PIO (custom component)
# - MQTT publishing via HA native API workaround (mqtt: not supported on RP2040)
# - PCF8574T IR eye buttons and LEDs via I2C
#
# Copy this to your ESPHome config directory and adjust to your setup.

esphome:
  name: beo-ir-bridge
  friendly_name: "B&O IR Bridge"

rp2040:
  board: rpipicow

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "beo-ir-setup"

captive_portal:

web_server:
  port: 80

# B&O IR decoder — custom PIO component
external_components:
  - source:
      type: local
      path: components

beo_ir:
  pin: 15
  pio: 0
  repeat_mode: translate  # raw | translate | suppress
  repeat_mode_select:
    name: "B&O Repeat Mode"
  on_command:
    - then:
        # Log to serial
        - logger.log:
            format: "B&O: addr=0x%02X(%s) cmd=0x%02X(%s) link=%d repeat=%d"
            args:
              - address
              - beo_address_name(address)
              - command
              - beo_command_name(command)
              - int(link)
              - int(repeat)
        # Publish to MQTT via HA service call (mqtt: not supported on RP2040)
        - homeassistant.service:
            service: mqtt.publish
            data:
              topic: beo2mqtt/command
              payload: !lambda |-
                char buf[256];
                snprintf(buf, sizeof(buf),
                  "{\"BeoSource\":\"ir\",\"Beolink\":%d,"
                  "\"BeoAddress\":%d,\"BeoAddressName\":\"%s\","
                  "\"BeoCommand\":%d,\"BeoCommandName\":\"%s\","
                  "\"BeoRepeat\":%s}",
                  link ? 1 : 0,
                  address, beo_address_name(address),
                  command, beo_command_name(command),
                  repeat ? "true" : "false");
                return std::string(buf);

# --- I2C IR Eye (PCF8574T) ---
# Requires level shifter on SDA/SCL (5V eye <-> 3.3V Pico)

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: false
  frequency: 10000

pcf8574:
  - id: ir_eye_io
    address: 0x20
    pcf8575: false

# Eye buttons — publish to same MQTT topic with source "eye"
binary_sensor:
  - platform: gpio
    name: "B&O Timer (Eye)"
    pin: { pcf8574: ir_eye_io, number: 0, mode: INPUT, inverted: true }
    on_press:
      then:
        - homeassistant.service:
            service: mqtt.publish
            data:
              topic: beo2mqtt/command
              payload: !lambda |-
                return "{\"BeoSource\":\"eye\",\"Beolink\":0,"
                       "\"BeoAddress\":1,\"BeoAddressName\":\"AUDIO\","
                       "\"BeoCommand\":240,\"BeoCommandName\":\"EYE_TIMER\"}";

  - platform: gpio
    name: "B&O Volume Up (Eye)"
    pin: { pcf8574: ir_eye_io, number: 1, mode: INPUT, inverted: true }
    on_press:
      then:
        - homeassistant.service:
            service: mqtt.publish
            data:
              topic: beo2mqtt/command
              payload: !lambda |-
                return "{\"BeoSource\":\"eye\",\"Beolink\":0,"
                       "\"BeoAddress\":1,\"BeoAddressName\":\"AUDIO\","
                       "\"BeoCommand\":96,\"BeoCommandName\":\"VOLUME_UP\"}";

  - platform: gpio
    name: "B&O Volume Down (Eye)"
    pin: { pcf8574: ir_eye_io, number: 2, mode: INPUT, inverted: true }
    on_press:
      then:
        - homeassistant.service:
            service: mqtt.publish
            data:
              topic: beo2mqtt/command
              payload: !lambda |-
                return "{\"BeoSource\":\"eye\",\"Beolink\":0,"
                       "\"BeoAddress\":1,\"BeoAddressName\":\"AUDIO\","
                       "\"BeoCommand\":100,\"BeoCommandName\":\"VOLUME_DOWN\"}";

  - platform: gpio
    name: "B&O Play (Eye)"
    pin: { pcf8574: ir_eye_io, number: 3, mode: INPUT, inverted: true }
    on_press:
      then:
        - homeassistant.service:
            service: mqtt.publish
            data:
              topic: beo2mqtt/command
              payload: !lambda |-
                return "{\"BeoSource\":\"eye\",\"Beolink\":0,"
                       "\"BeoAddress\":1,\"BeoAddressName\":\"AUDIO\","
                       "\"BeoCommand\":53,\"BeoCommandName\":\"GO\"}";

# Eye LEDs
switch:
  - platform: gpio
    name: "B&O Standby LED"
    pin: { pcf8574: ir_eye_io, number: 6, mode: OUTPUT, inverted: true }

  - platform: gpio
    name: "B&O Timer LED"
    pin: { pcf8574: ir_eye_io, number: 7, mode: OUTPUT, inverted: true }
